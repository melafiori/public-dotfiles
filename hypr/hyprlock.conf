source = ~/.config/waypaper/colors.css

# General settings
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = true
}

# Background
background {
    monitor =
    path = /home/melafiori/.cache/wallpaper/current
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 2
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = $on_primary
    font_size = 40
    font_family = JetBrains Mono Nerd Font Bold
    position = 50, -40
    halign = left
    valign = top
    
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "$(date +'%A, %d %B')"
    color = $on_primary
    font_size = 16
    font_family = JetBrains Mono Nerd Font
    position = 50, -120
    halign = left
    valign = top
}

# Card
shape {
	monitor = HDMI-A-1
	size = 310, 360
	color = rgba(0, 0, 0,0.6)
	rounding = 15
	border_size = 1
	border_color = rgba(255,255,255, 0.15)

	position = 0, 0
	halign = center
	valign = center
}

# pfp
image {
	monitor = HDMI-A-1
	path = /home/melafiori/.config/pfp.jpg
	border_color = 0xffdddddd
	border_size = 2
	size = 100
	rounding = -1
	rotate = 0
	reload_time = -1
	reload_cmd =

	position = 0, 95
	halign = center
	valign = center
}

# user
label {
	monitor = HDMI-A-1
	text = カシイ
	color = $on_surface
	font_size = 22
	font_family = JetBrainsMono Nerd Font Bold

	position = 0, 15
	halign = center
	valign = center
}

# input pass
input-field {
    monitor = HDMI-A-1
    size = 250, 50                   # Balanced aspect ratio for modern sizing
    outline_thickness = 1
    dots_size = 0.25 
    dots_spacing = 0.3 
    dots_center = true
    outer_color = $primary
    inner_color = $surface # Clean input area contrast
    font_color = $on_primary
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font 
    placeholder_text = <i><span foreground="##00000077">Enter Password...</span></i>
    hide_input = false
    
    position = 0, -65                # Positioned relative to card center base
    halign = center
    valign = center
}

